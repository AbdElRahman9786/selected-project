<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Aboss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-visual">
      <div class="auth-visual-inner">
        <div class="auth-geo auth-geo-1"></div>
        <div class="auth-geo auth-geo-2"></div>
        <span class="auth-badge">Administration</span>
        <div class="auth-brand">aboss<span>.</span></div>
        <p class="auth-slogan">Manage products,<br>users, and orders<br>from one place.</p>
      </div>
    </div>

    <div class="auth-form-panel">
      <div class="auth-form-inner">
        <h1 class="auth-title">Admin Sign In</h1>
        <p class="auth-subtitle">Enter your administrator credentials</p>

        <div class="auth-alert" id="login-alert" role="alert"></div>

        <form class="auth-form" id="admin-login-form" novalidate>
          <div class="form-group">
            <label for="login-email" class="form-label">Email Address</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input type="email" id="login-email" class="form-input" placeholder="admin@example.com" autocomplete="email" required />
            </div>
          </div>

          <div class="form-group">
            <label for="login-password" class="form-label">Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password" required />
              <button type="button" class="toggle-password" aria-label="Show password">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="auth-submit-btn" id="login-submit-btn">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader" id="login-loader"></span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="admin-auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => AdminAuth.initLoginPage());
  </script>
</body>
</html>

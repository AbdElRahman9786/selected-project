<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Aboss Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body data-page="dashboard">
  <div class="admin-shell">
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-sidebar-brand">
        <a href="index.html">aboss<span class="dot">.</span></a>
      </div>
      <p class="admin-sidebar-label">Menu</p>
      <ul class="admin-nav">
        <li><a href="index.html" class="admin-nav-link" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a></li>
        <li><a href="products.html" class="admin-nav-link" data-page="products">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
          Products
        </a></li>
        <li><a href="users.html" class="admin-nav-link" data-page="users">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          Users
        </a></li>
        <li><a href="orders.html" class="admin-nav-link" data-page="orders">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Orders
        </a></li>
      </ul>
      <div class="admin-sidebar-footer">
        <a href="#" class="admin-nav-link logout" data-logout>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </a>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <button class="admin-menu-toggle" id="menu-toggle" aria-label="Toggle menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="admin-topbar-title">Dashboard</h1>
        <div class="admin-topbar-right">
          <span class="admin-user-chip" id="admin-email">Admin</span>
        </div>
      </header>

      <main class="admin-content">
        <div id="dashboard-loading" class="loading-state">
          <div class="loading-spinner"></div>
          <p>Loading dashboard…</p>
        </div>
        <div id="dashboard-content" hidden>
          <div class="stats-grid" id="stats-grid"></div>
          <div class="admin-card">
            <div class="admin-card-header">
              <h3 style="font-family:var(--font-heading);font-size:20px;font-weight:800;">Quick Links</h3>
            </div>
            <div style="padding:24px;display:flex;flex-wrap:wrap;gap:12px;">
              <a href="products.html" class="btn btn-secondary">Manage Products</a>
              <a href="users.html" class="btn btn-secondary">Manage Users</a>
              <a href="orders.html" class="btn btn-secondary">View Orders</a>
            </div>
          </div>
        </div>
        <div id="dashboard-error" class="empty-state" hidden></div>
      </main>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="admin-auth.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>

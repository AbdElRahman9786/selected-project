<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – Aboss</title>
  <meta name="description" content="Create your Aboss account for faster checkout, order tracking and exclusive deals." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-body">

  <!-- Back to home -->
  <a href="index.html" class="back-link" id="back-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Store
  </a>

  <div class="auth-container auth-container--register" id="auth-container">

    <!-- Left panel: brand visual -->
    <div class="auth-panel auth-visual" id="auth-visual">
      <div class="auth-visual-inner">
        <div class="auth-geo auth-geo-1"></div>
        <div class="auth-geo auth-geo-2"></div>
        <div class="auth-geo auth-geo-3"></div>
        <div class="auth-brand" id="auth-brand">aboss<span>.</span></div>
        <p class="auth-slogan">Join thousands<br>of fitness lovers.</p>
        <ul class="auth-perks">
          <li>✓ Exclusive member deals</li>
          <li>✓ Fast, tracked checkout</li>
          <li>✓ Personalized recommendations</li>
          <li>✓ Early access to new drops</li>
        </ul>
        <div class="auth-switch-prompt">
          <p>Already have an account?</p>
          <a href="login.html" class="auth-switch-link" id="go-login">Sign In →</a>
        </div>
      </div>
    </div>

    <!-- Right panel: form -->
    <div class="auth-panel auth-form-panel" id="auth-form-panel">
      <div class="auth-form-inner">
        <h1 class="auth-title" id="register-title">Create Account</h1>
        <p class="auth-subtitle">It's free and only takes a minute</p>

        <!-- Alert box -->
        <div class="auth-alert" id="register-alert" role="alert"></div>

        <form class="auth-form" id="register-form" novalidate>

          <div class="form-row-2col">
            <div class="form-group">
              <label for="reg-firstname" class="form-label">First Name</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
                <input type="text" id="reg-firstname" name="firstname" class="form-input" placeholder="John" autocomplete="given-name" required />
              </div>
              <span class="form-error" id="err-firstname"></span>
            </div>
            <div class="form-group">
              <label for="reg-lastname" class="form-label">Last Name</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
                <input type="text" id="reg-lastname" name="lastname" class="form-input" placeholder="Doe" autocomplete="family-name" required />
              </div>
              <span class="form-error" id="err-lastname"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="reg-email" class="form-label">Email Address</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input type="email" id="reg-email" name="email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
            </div>
            <span class="form-error" id="err-reg-email"></span>
          </div>

          <div class="form-group">
            <label for="reg-phone" class="form-label">Phone <span class="optional">(optional)</span></label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.1a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.5h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10.1a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.5 17l1.42 2h-.92z"/></svg>
              </span>
              <input type="tel" id="reg-phone" name="phone" class="form-input" placeholder="+1 555 000 0000" autocomplete="tel" />
            </div>
          </div>

          <div class="form-group">
            <label for="reg-password" class="form-label">Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="reg-password" name="password" class="form-input" placeholder="Min. 8 characters" autocomplete="new-password" required />
              <button type="button" class="toggle-password" id="toggle-reg-pw" aria-label="Show/hide password">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="password-strength" id="password-strength">
              <div class="strength-bar"><span id="strength-fill"></span></div>
              <span id="strength-label"></span>
            </div>
            <span class="form-error" id="err-reg-password"></span>
          </div>

          <div class="form-group">
            <label for="reg-confirm" class="form-label">Confirm Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="reg-confirm" name="confirm" class="form-input" placeholder="Repeat password" autocomplete="new-password" required />
              <button type="button" class="toggle-password" id="toggle-reg-confirm" aria-label="Show/hide password">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="form-error" id="err-reg-confirm"></span>
          </div>

          <label class="checkbox-label terms-label" for="agree-terms">
            <input type="checkbox" id="agree-terms" name="terms" required />
            <span class="checkbox-custom"></span>
            I agree to the <a href="#" id="terms-link">Terms of Service</a> &amp; <a href="#" id="privacy-link">Privacy Policy</a>
          </label>
          <span class="form-error" id="err-terms"></span>

          <button type="submit" class="auth-submit-btn" id="register-submit-btn">
            <span class="btn-text">Create Account</span>
            <span class="btn-loader" id="register-loader"></span>
          </button>

        </form>

        <p class="auth-mobile-switch">Already a member? <a href="login.html" id="go-login-mobile">Sign in</a></p>
      </div>
    </div>

  </div>

  <script src="auth.js"></script>
  <script src="register.js"></script>
</body>
</html>

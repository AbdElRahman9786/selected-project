<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Aboss</title>
  <meta name="description" content="Sign in to your Aboss account to manage orders, wishlist and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-body">

  <!-- Back to home -->
  <a href="index.html" class="back-link" id="back-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Store
  </a>

  <div class="auth-container" id="auth-container">

    <!-- Left panel: brand visual -->
    <div class="auth-panel auth-visual" id="auth-visual">
      <div class="auth-visual-inner">
        <div class="auth-geo auth-geo-1"></div>
        <div class="auth-geo auth-geo-2"></div>
        <div class="auth-geo auth-geo-3"></div>
        <div class="auth-brand" id="auth-brand">aboss<span>.</span></div>
        <p class="auth-slogan">Gear up.<br>Push harder.<br>Live stronger.</p>
        <div class="auth-switch-prompt">
          <p>Don't have an account?</p>
          <a href="register.html" class="auth-switch-link" id="go-register">Create Account →</a>
        </div>
      </div>
    </div>

    <!-- Right panel: form -->
    <div class="auth-panel auth-form-panel" id="auth-form-panel">
      <div class="auth-form-inner">
        <h1 class="auth-title" id="login-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your account</p>

        <!-- Alert box -->
        <div class="auth-alert" id="login-alert" role="alert"></div>

        <form class="auth-form" id="login-form" novalidate>

          <div class="form-group" id="fg-email">
            <label for="login-email" class="form-label">Email Address</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input type="email" id="login-email" name="email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
            </div>
            <span class="form-error" id="err-login-email"></span>
          </div>

          <div class="form-group" id="fg-password">
            <label for="login-password" class="form-label">Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="login-password" name="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required />
              <button type="button" class="toggle-password" id="toggle-login-pw" aria-label="Show/hide password">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="form-error" id="err-login-password"></span>
          </div>

          <div class="form-row">
            <label class="checkbox-label" for="remember-me">
              <input type="checkbox" id="remember-me" name="remember" />
              <span class="checkbox-custom"></span>
              Remember me
            </label>
            <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="auth-submit-btn" id="login-submit-btn">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader" id="login-loader"></span>
          </button>

          <div class="auth-divider"><span>or continue with</span></div>

          <div class="social-auth-row">
            <button type="button" class="social-auth-btn" id="google-login">
              <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Google
            </button>
            <button type="button" class="social-auth-btn" id="facebook-login">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="#1877F2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
              Facebook
            </button>
          </div>

        </form>

        <p class="auth-mobile-switch">New here? <a href="register.html" id="go-register-mobile">Create an account</a></p>
      </div>
    </div>

  </div>

  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>

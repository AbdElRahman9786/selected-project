services:
  db:
  
    build:
      context: ./mysql-init
      dockerfile: Dockerfile
    ports:
    - "3307:3306"
    image: selected-project-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: shop_db
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-prootpassword']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped
    stop_grace_period: 30s

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: shop_db
      JWT_SECRET_KEY: dev-jwt-secret-change-in-production
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Admin123!
      ADMIN_FIRST_NAME: Admin
      ADMIN_LAST_NAME: User
      PAYMOB_API_KEY: ${PAYMOB_API_KEY}
      PAYMOB_INTEGRATION_ID: ${PAYMOB_INTEGRATION_ID}
      PAYMOB_IFRAME_ID: ${PAYMOB_IFRAME_ID}
      PAYMOB_REDIRECT_URL: ${PAYMOB_REDIRECT_URL}
      PAYMOB_CURRENCY: ${PAYMOB_CURRENCY:-EGP}
      FLASK_DEBUG: '0'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  user-frontend:
    build:
      context: ./apps/user-frontend
      dockerfile: Dockerfile
    ports:
      - '${USER_FRONTEND_PORT:-8082}:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  admin-frontend:
    build:
      context: ./apps/admin-frontend
      dockerfile: Dockerfile
    ports:
      - '8081:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
